# Default boot entry: open source drivers for all GPUs (Intel, AMD, older Nvidia via nouveau)
LABEL eos64
TEXT HELP
with open source drivers, including older Nvidia
Boot the ISO in Bios/legacy/CSM Mode..
Most modern systems should use UEFI mode instead.
ENDTEXT
MENU LABEL EndeavourOS  All GPUs (BIOS)
LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=10G copytoram=n module_blacklist=pcspkr nouveau.modeset=1 i915.modeset=1 radeon.modeset=1 nvme_load=yes quiet splash loglevel=3 nowatchdog mitigations=auto systemd.show_status=auto rd.luks=0 rd.lvm=0 rd.md=0

# Nvidia proprietary (Non-Free) drivers — RTX/Turing or newer only
LABEL eos64nv
TEXT HELP
Only RTX GPUs, Turing, or later
Boot the ISO in Bios/legacy/CSM Mode..
Most modern systems should use UEFI mode instead.
ENDTEXT
MENU LABEL EndeavourOS with NVIDIA drivers (Bios)
LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% cow_spacesize=10G copytoram=n module_blacklist=pcspkr,nouveau,nouveau_drm nouveau.modeset=0 i915.modeset=1 radeon.modeset=1 nvme_load=yes nvidia=1 quiet splash loglevel=3 nowatchdog mitigations=auto systemd.show_status=auto rd.luks=0 rd.lvm=0 rd.md=0

# Safe graphics fallback: disables kernel modesetting for problematic GPU configurations
LABEL eos64fb
TEXT HELP
Boot the ISO in Bios/legacy/CSM Mode..
Most modern systems should use UEFI mode instead.
Disables graphics driver modesetting for safer boot.
ENDTEXT
MENU LABEL EndeavourOS Safe Graphics nomodeset (BIOS)
LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=10G copytoram=n module_blacklist=pcspkr nomodeset nvme_load=yes quiet splash loglevel=3 nowatchdog mitigations=auto systemd.show_status=auto rd.luks=0 rd.lvm=0 rd.md=0

# Accessibility entry: enables accessibility features (screen reader, high contrast, etc.)
LABEL eos64a11y
TEXT HELP
Boot with accessibility features enabled.
Enables screen reader and other assistive technologies.
Boot the ISO in Bios/legacy/CSM Mode..
ENDTEXT
MENU LABEL EndeavourOS Accessibility (BIOS)
LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=10G copytoram=n module_blacklist=pcspkr nouveau.modeset=1 i915.modeset=1 radeon.modeset=1 nvme_load=yes accessibility=1 quiet splash loglevel=3 nowatchdog mitigations=auto systemd.show_status=auto rd.luks=0 rd.lvm=0 rd.md=0
