# PXE boot via NBD (Network Block Device)
LABEL eos64_nbd
TEXT HELP
Boot the EndeavourOS install medium using NBD.
It allows you to install EndeavourOS or perform system maintenance.
ENDTEXT
MENU LABEL EndeavourOS install medium (x86_64, NBD)
LINUX ::/%INSTALL_DIR%/boot/x86_64/vmlinuz-linux
INITRD ::/%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% archiso_nbd_srv=${pxeserver} cms_verify=y quiet splash loglevel=3 nowatchdog mitigations=auto systemd.show_status=auto rd.luks=0 rd.lvm=0 rd.md=0
SYSAPPEND 3

# PXE boot via NFS (Network File System)
LABEL eos64_nfs
TEXT HELP
Boot the EndeavourOS live medium using NFS.
It allows you to install EndeavourOS or perform system maintenance.
ENDTEXT
MENU LABEL EndeavourOS install medium (x86_64, NFS)
LINUX ::/%INSTALL_DIR%/boot/x86_64/vmlinuz-linux
INITRD ::/%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archiso_nfs_srv=${pxeserver}:/run/archiso/bootmnt cms_verify=y quiet splash loglevel=3 nowatchdog mitigations=auto systemd.show_status=auto rd.luks=0 rd.lvm=0 rd.md=0
SYSAPPEND 3

