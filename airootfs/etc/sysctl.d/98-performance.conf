# Performance tuning for EndeavourOS live session (RAM-focused)

# Virtual memory tuning (optimize for systems with RAM)
vm.swappiness = 10
vm.vfs_cache_pressure = 50
vm.dirty_ratio = 20
vm.dirty_background_ratio = 5

# Increase file watch limits (needed for IDEs, file managers)
fs.inotify.max_user_watches = 524288
fs.inotify.max_user_instances = 512
fs.inotify.max_queued_events = 32768

# Increase file descriptor limits
fs.file-max = 2097152

# Network performance
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216

# Network performance (queue/connection tuning)
net.core.netdev_max_backlog = 16384
net.core.somaxconn = 8192
net.ipv4.tcp_fastopen = 3
net.ipv4.tcp_tw_reuse = 1

# Kernel performance
kernel.nmi_watchdog = 0
kernel.unprivileged_userns_clone = 1
