title   EndeavourOS with NVIDIA drivers: Only RTX GPUs, Turing, or later
sort-key  B
linux   /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux
initrd  /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
options archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=10G copytoram=n module_blacklist=pcspkr,nouveau,nouveau_drm nouveau.modeset=0 nvidia_drm.modeset=1 i915.modeset=1 radeon.modeset=1 nvme_load=yes quiet splash loglevel=3 nowatchdog mitigations=auto systemd.show_status=auto rd.luks=0 rd.lvm=0 rd.md=0
